<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FreshKart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .auth-container {
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(245, 158, 11, 0.05) 100%);
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .auth-title { font-size: 28px; margin-bottom: 8px; }
        .auth-subtitle { color: var(--text-secondary); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
        .form-input { 
            width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); 
            border-radius: 12px; font-family: 'Inter'; font-size: 15px; transition: all 0.3s; background: #F8FAFC; 
        }
        .form-input:focus { outline: none; border-color: var(--primary-color); background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn-auth { width: 100%; padding: 14px; font-size: 16px; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 3H5L6.5 13H17.5L19 7H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
                        <circle cx="15" cy="20" r="1.5" fill="currentColor"/>
                        <path d="M14 6C14 6 15.5 7.5 15.5 10C15.5 12.5 12.5 14 12.5 14C12.5 14 11 12.5 11 10C11 7.5 12.5 6 14 6Z" fill="white" stroke="currentColor" stroke-width="1.2"/>
                    </svg>
                </div>
                FreshKart
            </a>
            <div class="nav-actions">
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card fade-in">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join FreshKart for a premium grocery experience.</p>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="signupName" class="form-input" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="signupEmail" class="form-input" placeholder="e.g. email@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="signupPassword" class="form-input" placeholder="Min. 8 characters" required minlength="8">
                    </div>
                    <button type="submit" class="btn-primary btn-auth">Create Account</button>
                </form>

                <p style="margin-top: 30px; font-size: 14px; color: var(--text-secondary);">
                    Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: 600;">Log in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Account created! Welcome to FreshKart.');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    showToast(data.error || 'Signup failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }
        });
    </script>
</body>
</html>
