<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline - FreshKart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .offline-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            padding: 20px;
            background: var(--bg-color);
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .offline-title {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-family: 'Outfit';
        }
        .offline-message {
            color: var(--text-secondary);
            margin-bottom: 30px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🌧️</div>
        <h1 class="offline-title">You're Offline</h1>
        <p class="offline-message">It seems you've lost your internet connection. Please check your network and try again.</p>
        <button class="btn-primary" onclick="window.location.reload();">Try Reconnecting</button>
    </div>
</body>
</html>
